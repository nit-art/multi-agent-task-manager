<!doctype html>
<html>
  <head>
    <title>AI Task Manager</title>
    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 400px;
        height: 600px;
        background: #1e293b;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .header {
        padding: 15px;
        background: #3b82f6;
        font-weight: bold;
        text-align: center;
      }

      .chat {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
      }

      .msg {
        margin: 8px 0;
        padding: 10px;
        border-radius: 10px;
        max-width: 80%;
      }

      .user {
        background: #2563eb;
        align-self: flex-end;
      }

      .bot {
        background: #334155;
        align-self: flex-start;
      }

      .input-area {
        display: flex;
        padding: 10px;
        background: #0f172a;
      }

      input {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
      }

      button {
        margin-left: 10px;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">🤖 AI Task Manager</div>

      <div id="chat" class="chat"></div>

      <div class="input-area">
        <input id="input" placeholder="Type your task..." />
        <button onclick="send()">Send</button>
      </div>
    </div>

    <script>
      async function send() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        const res = await fetch(
          "https://multi-agent-api-445178008005.asia-south1.run.app/query",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: text }),
          },
        );

        const data = await res.json();

        let reply = data.message;

        if (data.results) {
          reply += "\n\n";
          data.results.forEach((r) => {
            reply += "• " + r.message + "\n";
          });
        }

        addMessage(reply, "bot");
      }

      function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.innerText = text;

        document.getElementById("chat").appendChild(div);
      }
    </script>
  </body>
</html>
